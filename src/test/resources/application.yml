spring:
  datasource:
    url: jdbc:h2:mem:agerdon;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  security:
    jwt:
      token:
        secret-key: testSecretKeyMustBeLongEnoughForHmacShaSigning1234567890
        expire-length: 3600000

api:
  kakao:
    rest-key: test-kakao-key
  seoul:
    metro-key: test-metro-key
    metro-realtime-key: test-metro-realtime-key
  bus:
    service-key: test-bus-key

trip:
  route-provider: mock
