spring:
  datasource:
    url: jdbc:mysql://my-mysql:3306/agerdon?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: ${DB_PASSWORD:Tcclee8747!!}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    sql:
      init:
        mode: always
  security:
    jwt:
      token:
        secret-key: yourSecretKeyMustBeVeryLongAndSecureBase64EncodedStringExample1234567890
        expire-length: 3600000

server:
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

api:
  kakao:
    rest-key: ${KAKAO_REST_KEY}
  seoul:
    metro-key: ${SEOUL_METRO_KEY}
    metro-realtime-key: ${SEOUL_METRO_REALTIME_KEY}
  bus:
    service-key: ${BUS_SERVICE_KEY}