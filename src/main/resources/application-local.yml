spring:
  datasource:
    url: jdbc:h2:mem:agerdon-local;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop

api:
  kakao:
    rest-key: ${KAKAO_REST_KEY:local-dummy-key}
  seoul:
    metro-key: ${SEOUL_METRO_KEY:local-dummy-key}
    metro-realtime-key: ${SEOUL_METRO_REALTIME_KEY:local-dummy-key}
  bus:
    service-key: ${BUS_SERVICE_KEY:local-dummy-key}

trip:
  route-provider: ${TRIP_ROUTE_PROVIDER:hybrid}
