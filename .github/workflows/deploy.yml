name: Deploy to EC2 with Docker

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew clean build -x test

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/football-app:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/football-app:latest

      - name: Application Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            cd /home/ubuntu/app

            docker compose pull app
            docker compose up -d

            sleep 15
            if [ "$(docker inspect -f '{{.State.Running}}' my-spring-app)" != "true" ]; then
              echo "ERROR: my-spring-app failed to start"
              docker compose logs --tail 50 app
              exit 1
            fi

            HEALTHY=false
            for i in $(seq 1 10); do
              if curl -sf http://localhost:8080/actuator/health > /dev/null; then
                echo "Health check passed"
                HEALTHY=true
                break
              fi
              echo "Waiting for app to become healthy... ($i/10)"
              sleep 5
            done

            if [ "$HEALTHY" != "true" ]; then
              echo "ERROR: my-spring-app is running but /actuator/health did not respond in time"
              docker compose logs --tail 80 app
              exit 1
            fi

            docker image prune -af