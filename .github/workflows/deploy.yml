  name: Application Deploy to EC2
  uses: appleboy/ssh-action@v1.0.3
  with:
    host: ${{ secrets.EC2_HOST }}
    username: ${{ secrets.EC2_USERNAME }}
    key: ${{ secrets.EC2_KEY }}
    script: |
      set -e
      cd /home/ubuntu/app

      docker compose pull app
      docker compose up -d

      sleep 15
      if [ "$(docker inspect -f '{{.State.Running}}' my-spring-app)" != "true" ]; then
        echo "ERROR: my-spring-app failed to start"
        docker compose logs --tail 50 app
        exit 1
      fi

      docker image prune -af